[API]
provider = openrouter
model = claude-sonnet-4
max_tokens = 1500

[API_OPENROUTER]
model = google/gemini-3.1-pro-preview

[API_OPENAI]
model = gpt-5.2-chat-latest

[API_GEMINI]
model = gemini-3.1-pro-preview

[HOTKEYS]
toggle = ctrl+shift+space
capture = ctrl+shift+s
clear = ctrl+shift+c
focus = ctrl+shift+i
export = ctrl+shift+e

[UI]
width = 500
height = 650
start_x = 60
start_y = 60
opacity = 0.94

[CAPTURE]
max_width = 1280
jpeg_quality = 82
hide_delay_ms = 250

[LICENSE]
# Node.js license server (local testing). Override via .env — see .env.example
activate_base_url = http://localhost:3000
get_license_url = http://localhost:3000/request
# POST path appended to activate_base_url
activate_path = /api/activate
# Saved under %APPDATA%\<appdata_folder>\
license_filename = license.jwt
activate_timeout_seconds = 30
# Reject if system clock is rolled back beyond this grace (hours)
clock_rollback_grace_hours = 24
