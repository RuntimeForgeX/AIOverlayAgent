[API]
provider = openrouter
model = claude-sonnet-4
max_tokens = 4000

[API_OPENROUTER]
model = google/gemini-3.1-pro-preview

[API_OPENAI]
model = gpt-5.2-chat-latest

[API_GEMINI]
model = gemini-3.1-pro-preview

[HOTKEYS]
toggle = ctrl+shift+space
capture = ctrl+shift+s
clear = ctrl+shift+c
focus = ctrl+shift+i
export = ctrl+shift+e
scroll_up = ctrl+shift+up
scroll_down = ctrl+shift+down
jump_prev_ai = ctrl+shift+pageup
jump_next_ai = ctrl+shift+pagedown
jump_top = ctrl+shift+home
jump_latest = ctrl+shift+end
send = ctrl+shift+enter
regenerate = ctrl+shift+r
stop = ctrl+shift+x
copy_last = ctrl+shift+k
toggle_mode = ctrl+shift+m
move_left = ctrl+shift+left
move_right = ctrl+shift+right
move_up = ctrl+shift+alt+up
move_down = ctrl+shift+alt+down
reset_position = ctrl+shift+0
toggle_click_through = ctrl+shift+t
cycle_model_fwd = ctrl+shift+alt+pagedown
cycle_model_back = ctrl+shift+alt+pageup

[UI]
width = 500
height = 650
start_x = 60
start_y = 60
opacity = 0.94

[CAPTURE]
max_width = 1280
jpeg_quality = 82
hide_delay_ms = 250

[LICENSE]
# Node.js license server — these are build-time defaults, NOT loaded from .env.
# LICENSE_AUTH is always 1 in the packaged exe (hardcoded in src/licensing/config.py).
# In dev you can override the URLs via env vars; in production they come from here.
node_port = 443
activate_base_url = https://personalaiagentsurya.vercel.app
get_license_url = https://personalaiagentsurya.vercel.app/request
# POST path appended to activate_base_url
activate_path = /api/activate
# Saved under %APPDATA%\<appdata_folder>\
license_filename = license.jwt
activate_timeout_seconds = 30
# Reject if system clock is rolled back beyond this grace (hours)
clock_rollback_grace_hours = 24
